<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
    <title>Headphones</title>
</head>
<body>

    <div class="wrapper-top">
        <header class="header">
            <div class="logo">
                <img src="img/logo.svg" alt="">
                <span class="logo-brand">Mvsaxi</span>
            </div>

            <div class="header-right">
                <nav class="nav">
                    <a class="nav-link" href="#">Home</a>
                    <a class="nav-link" href="#">Tech Specs</a>
                </nav>

                <a class="btn" href="#">Compare</a>
            </div>
        </header>

        <div class="hero">
            <h1 class="hero-title-top">Resonance</h1>
            <img class="hero-img" src="img/Headphone.png" alt="">
            <h1 class="hero-title-bottom">Aura Pro II</h1>
        </div>
    </div>

    <section class="carousel">
        <div class="carousel-features">
            <h1 class="carousel-title">Your Style. Your Sound.</h1>
            <p class="carousel-text">Studio-grade acoustics that dissolve distractions and awaken clarity.</p>
        </div>

        <div class="carousel-headphones">
            <div class="carousel-track">
                <img src="img/headphones(yellow).png" alt="" class="slide">
                <img src="img/headphones(green).png" alt="" class="slide">
                <img src="img/headphones(red).png" alt="" class="slide">
            </div>
        </div>

        <div class="carousel-colors">
            <div class="swatches">
                    <button class="swatch" data-index="0" style="--c: #D4A827" aria-label="Yellow"></button>
                    <button class="swatch" data-index="1" style="--c: #7A8C3E" aria-label="Green"></button>
                    <button class="swatch" data-index="2" style="--c: #9B3A3A" aria-label="Red"></button>
            </div>
            <p class="carousel-text">Choose a color that fits your flow.</p>
        </div>

    </section>

    <script src="script.js"></script>
</body>
</html>
